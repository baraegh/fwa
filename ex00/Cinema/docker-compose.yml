services:
  postgres:
    image: postgres:15
    container_name: cinema_db
    environment:
      POSTGRES_DB: cinema_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./src/main/resources/sql/data.sql:/docker-entrypoint-initdb.d/02_data.sql
    restart: unless-stopped

volumes:
  pgdata:
